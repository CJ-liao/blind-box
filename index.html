<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>🌈 小公主的魔法盲盒</title>

<!-- PWA / iPad 支持 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="魔法盲盒">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b6b">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans SC',sans-serif;
    min-height:100vh;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 30%, #ff9a9e 60%, #fecfef 100%);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
    overflow-x:hidden;
    display:flex; flex-direction:column; align-items:center;
    padding:10px;
  }
  @keyframes bgShift {
    0%,100% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
  }

  /* Floating decorations */
  .floating-deco {
    position:fixed; pointer-events:none; z-index:0; opacity:0.35;
    animation: floatAround 8s ease-in-out infinite;
    font-size:38px;
  }
  @keyframes floatAround {
    0%,100% { transform:translateY(0) rotate(0deg); }
    25% { transform:translateY(-30px) rotate(10deg); }
    50% { transform:translateY(-10px) rotate(-5deg); }
    75% { transform:translateY(-40px) rotate(8deg); }
  }

  /* Header */
  .header {
    text-align:center; z-index:1; margin:10px 0 6px;
  }
  .header .title {
    font-size:clamp(26px,5.5vw,44px); font-weight:900;
    background: linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);
    background-size:300% 100%;
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    animation: rainbow 3s linear infinite;
    line-height:1.3;
  }
  @keyframes rainbow {
    0% { background-position:0% 50%; }
    100% { background-position:300% 50%; }
  }
  .header .subtitle {
    font-size:clamp(13px,2.5vw,18px); color:#8b5e3c; font-weight:700;
    margin-top:2px;
  }

  /* Box grid — iPad 3列，小手机2列 */
  .box-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:clamp(12px,3vw,30px);
    max-width:750px; width:100%;
    z-index:1; margin:0 auto 10px;
    padding:0 12px;
  }
  /* iPad 大屏：盒子更大、间距更宽 */
  @media (min-width:768px) {
    .box-grid { gap:28px; max-width:800px; }
    .box-front .question-mark { font-size:clamp(48px,8vw,80px) !important; }
    .box-front .tap-hint { font-size:16px !important; }
    .box-back .result-emoji { font-size:clamp(38px,5vw,56px) !important; }
    .box-back .result-text { font-size:clamp(13px,2vw,16px) !important; }
    .box-back .result-tag { font-size:11px !important; }
  }
  @media (max-width:420px) {
    .box-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
  }

  /* Blind box card */
  .box-card {
    aspect-ratio:1;
    perspective:800px;
    cursor:pointer;
    transition:transform 0.15s;
  }
  .box-card:hover:not(.used):not(.locked) { transform:scale(1.03); }
  .box-card:active:not(.used):not(.locked) { transform:scale(0.96); }
  .box-card.locked { cursor:not-allowed; filter:brightness(0.85) saturate(0.4); }
  .box-card.locked .box-front { border-color:#ddd !important; }
  .box-card.locked .question-mark { filter:grayscale(0.7) opacity(0.5); }

  .box-inner {
    width:100%; height:100%;
    position:relative; transition:transform 0.55s cubic-bezier(0.4,0,0.2,1);
    transform-style:preserve-3d;
    border-radius:20px;
  }
  .box-card.opened .box-inner { transform:rotateY(180deg); }

  .box-front, .box-back {
    position:absolute; width:100%; height:100%;
    backface-visibility:hidden; border-radius:20px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  .box-front {
    background:linear-gradient(145deg,#fff5f5,#ffe0e0,#ffd4d4);
    border:3px dashed #ffb3b3;
    box-shadow:0 6px 25px rgba(0,0,0,0.08);
  }
  .box-front .question-mark {
    font-size:clamp(36px,9vw,64px); font-weight:900;
    color:#ff6b6b; text-shadow:2px 2px 0 #ffd4d4;
    animation: bounceQM 1.5s ease-in-out infinite;
  }
  @keyframes bounceQM {
    0%,100%{transform:translateY(0) scale(1)}
    30%{transform:translateY(-14px) scale(1.1)}
    60%{transform:translateY(0) scale(0.95)}
    80%{transform:translateY(-5px) scale(1.05)}
  }
  .box-front .tap-hint {
    font-size:14px; color:#e88; margin-top:4px; font-weight:900;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* Box colors - pastel rainbow */
  .box-card:nth-child(1) .box-front{background:linear-gradient(145deg,#fff0f5,#ffd6e7,#ffc2d9);border-color:#ffb3cc}
  .box-card:nth-child(2) .box-front{background:linear-gradient(145deg,#fff8e8,#ffe8c8,#ffd9a8);border-color:#ffcc88}
  .box-card:nth-child(3) .box-front{background:linear-gradient(145deg,#f0fff0,#d4f5d4,#b8ebb8);border-color:#99dd99}
  .box-card:nth-child(4) .box-front{background:linear-gradient(145deg,#f0f5ff,#d4e4ff,#b8d4ff);border-color:#99bbff}
  .box-card:nth-child(5) .box-front{background:linear-gradient(145deg,#fff5ff,#f0d4ff,#e5b8ff);border-color:#cc99ee}
  .box-card:nth-child(6) .box-front{background:linear-gradient(145deg,#fffdf0,#fff0c0,#ffe8a0);border-color:#ffdd77}

  .box-back {
    background:linear-gradient(145deg,#fffdf5,#fff8e8,#fff3d0);
    border:4px solid #ffd700;
    transform:rotateY(180deg);
    padding:8px; text-align:center;
    box-shadow:0 0 35px rgba(255,215,0,0.35);
  }
  .box-back .result-emoji { font-size:clamp(30px,7vw,48px); }
  .box-back .result-text {
    font-size:clamp(10px,2.2vw,14px); font-weight:900;
    color:#6b4226; margin-top:2px; line-height:1.3;
    white-space:pre-line;
  }
  .box-back .result-tag {
    font-size:9px; padding:2px 8px; border-radius:10px;
    margin-top:4px; font-weight:700;
  }
  .tag-learn{background:#ffe0e0;color:#d44}
  .tag-fun{background:#e0f0ff;color:#48c}
  .tag-reward{background:#fff0d0;color:#e8a010}
  .tag-big{background:#ffd700;color:#c00;font-size:10px}

  /* Completed checkmark overlay */
  .box-card.done::after {
    content:'✅'; position:absolute; top:-6px; right:-6px;
    font-size:26px; z-index:5;
    animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes popIn {
    0%{transform:scale(0);opacity:0}
    100%{transform:scale(1);opacity:1}
  }

  /* Shaking */
  .box-card.shaking .box-inner {
    animation: shake 0.5s ease-in-out;
  }
  @keyframes shake {
    0%,100%{transform:rotateY(0) translateX(0)}
    10%{transform:rotateY(-10deg) translateX(-6px)}
    20%{transform:rotateY(10deg) translateX(6px)}
    30%{transform:rotateY(-15deg) translateX(-8px)}
    40%{transform:rotateY(15deg) translateX(8px)}
    50%{transform:rotateY(-10deg) translateX(-4px)}
    60%{transform:rotateY(10deg) translateX(4px)}
    70%{transform:rotateY(-5deg) translateX(-2px)}
    80%{transform:rotateY(5deg) translateX(2px)}
    90%{transform:rotateY(-2deg) translateX(0)}
  }

  /* Confetti */
  .confetti-piece {
    position:fixed; pointer-events:none; z-index:100;
    animation: confettiFall 1.8s ease-out forwards;
  }
  @keyframes confettiFall {
    0%{transform:translateY(-120px) rotate(0deg) scale(1);opacity:1}
    70%{opacity:1}
    100%{transform:translateY(105vh) rotate(720deg) scale(0.3);opacity:0}
  }
  .sparkle-burst {
    position:fixed; pointer-events:none; z-index:101;
    animation: burstOut 0.9s ease-out forwards;
    font-size:26px;
  }
  @keyframes burstOut {
    0%{transform:translate(0,0) scale(0);opacity:1}
    100%{transform:translate(var(--dx),var(--dy)) scale(1.5);opacity:0}
  }

  /* Overlay */
  .overlay {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.5); z-index:90;
    display:flex; align-items:center; justify-content:center;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .overlay-card {
    background:white; border-radius:26px; padding:25px 20px;
    text-align:center; max-width:320px; width:90%;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    animation: popInCard 0.45s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes popInCard {
    0%{transform:scale(0.3);opacity:0}
    100%{transform:scale(1);opacity:1}
  }
  .overlay-card .big-emoji { font-size:72px; display:block; }
  .overlay-card .big-text {
    font-size:22px; font-weight:900; color:#6b4226; margin:8px 0;
    white-space:pre-line; line-height:1.4;
  }
  .overlay-card .big-note {
    font-size:14px; color:#999; margin-bottom:14px;
  }
  .overlay-card .btn-done {
    background:linear-gradient(135deg,#6bcb77,#4caf50);
    border:none; color:white; font-size:20px; font-weight:900;
    padding:14px 40px; border-radius:30px; cursor:pointer;
    box-shadow:0 6px 20px rgba(107,203,119,0.4);
    transition:transform 0.15s;
    font-family:inherit; display:block; width:100%;
  }
  .overlay-card .btn-done:active { transform:scale(0.93); }

  /* Scrolling ticker */
  .ticker-wrap {
    width:100%; max-width:650px; overflow:hidden; z-index:1;
    background:rgba(255,255,255,0.55); backdrop-filter:blur(8px);
    border-radius:18px; padding:10px 0; margin:6px 0 10px;
    box-shadow:0 2px 12px rgba(0,0,0,0.06); position:relative;
  }
  .ticker-label {
    text-align:center; font-size:12px; color:#b88; font-weight:700;
    margin-bottom:4px;
  }
  .ticker-track {
    display:flex; animation: scroll 30s linear infinite; gap:16px;
    padding:0 16px;
  }
  @keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-50%); }
  }
  .ticker-item {
    flex-shrink:0; display:flex; flex-direction:column;
    align-items:center; font-size:12px; font-weight:700;
    color:#6b4226; min-width:48px;
  }
  .ticker-item .t-emoji { font-size:26px; }
  .ticker-item .t-text { font-size:9px; text-align:center; white-space:pre-line; line-height:1.2; }

  /* Reset button */
  .reset-btn {
    position:fixed; bottom:18px; right:18px; z-index:10;
    background:rgba(255,255,255,0.8); border:none;
    font-size:26px; width:48px; height:48px; border-radius:24px;
    cursor:pointer; box-shadow:0 3px 12px rgba(0,0,0,0.1);
    transition:transform 0.2s;
  }
  .reset-btn:hover { transform:scale(1.1) rotate(30deg); }
</style>
</head>
<body>

<!-- Floating decorations -->
<div class="floating-deco" style="top:6%;left:4%;">🦄</div>
<div class="floating-deco" style="top:12%;right:5%;animation-delay:1.5s;">⭐</div>
<div class="floating-deco" style="top:50%;left:2%;animation-delay:3s;">🌈</div>
<div class="floating-deco" style="top:65%;right:3%;animation-delay:4.5s;">🎀</div>
<div class="floating-deco" style="bottom:15%;left:6%;animation-delay:6s;">💖</div>
<div class="floating-deco" style="bottom:8%;right:8%;animation-delay:2s;">🌸</div>

<!-- Header -->
<div class="header">
  <div class="title">🎁 小公主的魔法盲盒 🎁</div>
  <div class="subtitle">✨ 每天打开 6 个盲盒，完成一个才能开下一个 ✨</div>
</div>

<!-- Box grid -->
<div class="box-grid" id="boxGrid"></div>

<!-- Scrolling ticker -->
<div class="ticker-wrap">
  <div class="ticker-label">🎪 盲盒里都有什么？</div>
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<!-- Confetti container -->
<div id="confetti"></div>

<!-- Reset -->
<button class="reset-btn" onclick="resetGame()" title="重新开始">🔄</button>

<script>
// ====================== ACTIVITY POOL ======================
const activities = [
  // Learning tasks (weight 6 each → 36/55 ≈ 65%)
  { emoji:'📖', text:'英语阅读\n15分钟', tag:'学习任务', tagClass:'tag-learn', group:'learn', weight:6 },
  { emoji:'✏️', text:'看图写话\n一篇小作文', tag:'学习任务', tagClass:'tag-learn', group:'learn', weight:6 },
  { emoji:'🎹', text:'钢琴练习\n15分钟', tag:'学习任务', tagClass:'tag-learn', group:'learn', weight:6 },
  { emoji:'🧮', text:'数学口算\n15分钟', tag:'学习任务', tagClass:'tag-learn', group:'learn', weight:6 },
  { emoji:'📝', text:'古诗词背诵\n一首古诗', tag:'学习任务', tagClass:'tag-learn', group:'learn', weight:6 },
  { emoji:'📐', text:'做数学题\n20分钟', tag:'学习任务', tagClass:'tag-learn', group:'learn', weight:6 },

  // Fun activities (weight 3 each → 9/55 ≈ 16%)
  { emoji:'🎨', text:'手工游戏\n创意时间', tag:'趣味活动', tagClass:'tag-fun', group:'fun', weight:3 },
  { emoji:'👶', text:'陪弟弟玩耍\n30分钟', tag:'趣味活动', tagClass:'tag-fun', group:'fun', weight:3 },
  { emoji:'🖼️', text:'自由画画\n15分钟', tag:'趣味活动', tagClass:'tag-fun', group:'fun', weight:3 },

  // Rewards — regular (weight 2 each → 6/55 ≈ 11%)
  { emoji:'📱', text:'看平板\n15分钟', tag:'小惊喜', tagClass:'tag-reward', group:'reward', weight:2 },
  { emoji:'🎁', text:'奖励\n10元礼物', tag:'小惊喜', tagClass:'tag-reward', group:'reward', weight:2 },
  { emoji:'💰', text:'奖励\n20元礼物', tag:'小惊喜', tagClass:'tag-reward', group:'reward', weight:2 },

  // Rewards — big (weight 2 → 2/55 ≈ 4%)
  { emoji:'💎', text:'奖励\n30元礼物', tag:'大惊喜', tagClass:'tag-big', group:'reward', weight:2 },

  // Rewards — rare (weight 1 each → 2/55 ≈ 4%)
  { emoji:'☕', text:'奖励\n休息半天', tag:'超级惊喜', tagClass:'tag-big', group:'reward', weight:1 },
  { emoji:'🏖️', text:'奖励\n休息一天', tag:'超级惊喜', tagClass:'tag-big', group:'reward', weight:1 },
];

// Build weighted pool (total weight = 36+9+6+2+2 = 55)
const pool = [];
activities.forEach(a => { for(let i=0;i<a.weight;i++) pool.push(a); });

// ====================== GAME STATE ======================
const TOTAL_BOXES = 6;
let currentTaskIndex = -1;   // which box has an active (uncompleted) task
let completedMask = 0;        // bitmask of completed boxes
let revealedItems = [];
let globalLocked = false;     // true while a task popup is showing

// ====================== SHUFFLE & DRAW ======================
function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function drawActivities(n) {
  const shuffled = [...pool];
  shuffle(shuffled);
  const drawn = [];
  const gc = {learn:0, fun:0, reward:0};

  for (const item of shuffled) {
    if (drawn.length >= n) break;
    if (item.group==='learn' && gc.learn>=4) continue;
    if (item.group==='fun' && gc.fun>=2) continue;
    if (item.group==='reward' && gc.reward>=2) continue;
    if (drawn.some(d=>d.text===item.text)) continue;
    drawn.push(item);
    gc[item.group]++;
  }
  while (drawn.length < n) {
    const item = shuffled[Math.floor(Math.random()*shuffled.length)];
    if (!drawn.some(d=>d.text===item.text)) drawn.push(item);
  }
  shuffle(drawn);
  return drawn;
}

// ====================== INIT ======================
function initGame() {
  currentTaskIndex = -1;
  completedMask = 0;
  globalLocked = false;
  revealedItems = drawActivities(TOTAL_BOXES);

  const grid = document.getElementById('boxGrid');
  grid.innerHTML = '';

  for (let i = 0; i < TOTAL_BOXES; i++) {
    const card = document.createElement('div');
    card.className = 'box-card';
    card.id = `box-${i}`;
    card.innerHTML = `
      <div class="box-inner">
        <div class="box-front">
          <div class="question-mark">🎁</div>
          <div class="tap-hint">👆 点我打开</div>
        </div>
        <div class="box-back">
          <div class="result-emoji"></div>
          <div class="result-text"></div>
          <div class="result-tag"></div>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openBox(i, card));
    grid.appendChild(card);
  }

  buildTicker();
  updateLockState();
}

// ====================== SCROLLING TICKER ======================
function buildTicker() {
  const track = document.getElementById('tickerTrack');
  const items = activities.map(a =>
    `<div class="ticker-item"><span class="t-emoji">${a.emoji}</span><span class="t-text">${a.text.replace(/\n/g,'<br>')}</span></div>`
  ).join('');
  // Duplicate for seamless loop
  track.innerHTML = items + items;
}

// ====================== LOCK / UNLOCK ======================
function updateLockState() {
  const cards = document.querySelectorAll('.box-card');
  cards.forEach((card, i) => {
    // Already completed
    if (completedMask & (1<<i)) {
      card.classList.add('done');
      return;
    }
    // Active task (opened but not completed)
    if (i === currentTaskIndex) {
      card.classList.add('opened');
      card.classList.remove('locked');
      return;
    }
    // Locked because another task is in progress
    if (currentTaskIndex >= 0 && !(completedMask & (1<<i))) {
      card.classList.add('locked');
    } else {
      card.classList.remove('locked');
    }
  });
}

function canOpenBox(index) {
  if (completedMask & (1<<index)) return false; // already completed
  if (index === currentTaskIndex) return false;  // already opened
  if (currentTaskIndex >= 0) return false;       // another task in progress
  if (globalLocked) return false;
  return true;
}

// ====================== OPEN BOX ======================
function openBox(index, card) {
  if (!canOpenBox(index)) return;

  const item = revealedItems[index];
  globalLocked = true;
  currentTaskIndex = index;
  card.classList.add('shaking');

  // During shake, fill back face
  setTimeout(() => {
    const back = card.querySelector('.box-back');
    back.querySelector('.result-emoji').textContent = item.emoji;
    back.querySelector('.result-text').textContent = item.text;
    const tag = back.querySelector('.result-tag');
    tag.textContent = item.tag;
    tag.className = 'result-tag ' + item.tagClass;
  }, 280);

  // After shake, flip
  setTimeout(() => {
    card.classList.remove('shaking');
    card.classList.add('opened');
    updateLockState();

    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    spawnSparkles(cx, cy);
    spawnConfetti();

    setTimeout(() => showTaskPopup(item, index), 600);
  }, 520);
}

// ====================== TASK POPUP ======================
function showTaskPopup(item, index) {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'taskOverlay';

  const noteMap = {
    learn: '加油！认真完成后点按钮 ✨',
    fun: '开心地玩吧！结束后点按钮 🎉',
    reward: '哇！太幸运了！🎊'
  };

  overlay.innerHTML = `
    <div class="overlay-card">
      <span class="big-emoji">${item.emoji}</span>
      <div class="big-text">${item.text.replace(/\n/g,'<br>')}</div>
      <div class="big-note">${noteMap[item.group]}</div>
      <button class="btn-done" onclick="completeTask(${index})">我完成啦！✅</button>
    </div>
  `;

  document.body.appendChild(overlay);
}

function completeTask(index) {
  const overlay = document.getElementById('taskOverlay');
  if (overlay) {
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.25s';
    setTimeout(() => overlay.remove(), 250);
  }

  completedMask |= (1<<index);
  currentTaskIndex = -1;
  globalLocked = false;
  updateLockState();

  // Celebration for completing
  const card = document.getElementById(`box-${index}`);
  if (card) {
    const rect = card.getBoundingClientRect();
    spawnSparkles(rect.left+rect.width/2, rect.top+rect.height/2);
  }

  // All done?
  if (completedMask === (1<<TOTAL_BOXES)-1) {
    setTimeout(() => showAllDone(), 600);
  }
}

function showAllDone() {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'allDoneOverlay';
  overlay.innerHTML = `
    <div class="overlay-card">
      <span class="big-emoji">🏆</span>
      <div class="big-text">太棒啦！<br>今天的任务全部完成！</div>
      <div class="big-note">明天再来开盲盒哦～</div>
      <button class="btn-done" style="background:linear-gradient(135deg,#ff6b6b,#ff8e53)"
              onclick="resetGame()">🔄 再开一轮</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

// ====================== EFFECTS ======================
function spawnSparkles(cx, cy) {
  const emojis = ['✨','⭐','💫','🌟','💖','🎉','🪄','🔮'];
  for (let i=0;i<14;i++) {
    const s = document.createElement('div');
    s.className='sparkle-burst';
    s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left=cx+'px'; s.style.top=cy+'px';
    s.style.setProperty('--dx',(Math.random()-0.5)*260+'px');
    s.style.setProperty('--dy',(Math.random()-0.5)*260-80+'px');
    s.style.animationDelay=Math.random()*0.12+'s';
    s.style.animationDuration=(0.6+Math.random()*0.5)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1100);
  }
}

function spawnConfetti() {
  const container = document.getElementById('confetti') || document.body;
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff8e53','#ff69b4',
                  '#a18cd1','#fbc2eb','#84fab0','#ff9a9e','#fad0c4','#a1c4fd'];
  const shapes = ['■','●','▲','★','♦','♥'];
  for (let i=0;i<50;i++) {
    const p = document.createElement('div');
    p.className='confetti-piece';
    p.textContent=shapes[Math.floor(Math.random()*shapes.length)];
    p.style.left=Math.random()*100+'%';
    p.style.top=-(10+Math.random()*35)+'px';
    p.style.color=colors[Math.floor(Math.random()*colors.length)];
    p.style.fontSize=(9+Math.random()*14)+'px';
    p.style.animationDelay=Math.random()*0.5+'s';
    p.style.animationDuration=(1.4+Math.random()*1.8)+'s';
    container.appendChild(p);
    setTimeout(()=>p.remove(),2800);
  }
}

// ====================== RESET ======================
function resetGame() {
  document.getElementById('confetti') && (document.getElementById('confetti').innerHTML='');
  ['taskOverlay','allDoneOverlay'].forEach(id=>{
    const el=document.getElementById(id); if(el)el.remove();
  });
  initGame();
}

// ====================== START ======================
initGame();

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

document.addEventListener('touchstart', function(){}, {passive:true});
document.body.style.webkitTouchCallout = 'none';
document.body.style.webkitUserSelect = 'none';
document.body.style.userSelect = 'none';
</script>
