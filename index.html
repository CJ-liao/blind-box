<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>🌈 小公主的魔法盲盒</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="魔法盲盒">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b6b">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
  background:linear-gradient(135deg,#ffecd2,#fcb69f,#ff9a9e,#fecfef);
  background-size:400% 400%; animation:bgShift 12s ease infinite;
  min-height:100vh; overflow-x:hidden;
}
@keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.app{display:flex;min-height:100vh;max-width:1100px;margin:0 auto}
.sidebar{
  width:280px;min-width:240px;background:rgba(255,255,255,0.55);
  backdrop-filter:blur(10px);border-right:1px solid rgba(255,255,255,0.4);
  padding:12px;display:flex;flex-direction:column;gap:8px;z-index:10;overflow-y:auto;
}
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px;min-width:0}
@media(max-width:768px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:0;max-height:200px;flex-shrink:0;border-right:none;border-bottom:1px solid rgba(255,255,255,0.4);overflow-y:auto;flex-direction:row;flex-wrap:wrap;gap:6px;align-content:flex-start;padding:8px}
  .sidebar .sb-block{width:auto;flex-shrink:0}
}
.sidebar h3{font-size:14px;color:#6b4226;text-align:center;margin:2px 0}
.sb-date{font-size:12px;color:#b88;text-align:center}
.sb-item{
  background:white;border-radius:10px;padding:7px 9px;display:flex;align-items:center;gap:7px;
  box-shadow:0 1px 6px rgba(0,0,0,0.05);cursor:pointer;border:2px solid transparent;transition:all 0.2s;
}
.sb-item.done{border-color:#6bcb77;background:#f5fff5}
.sb-item .sbi-emoji{font-size:22px;flex-shrink:0}
.sb-item .sbi-text{font-size:11px;font-weight:700;color:#6b4226;line-height:1.2;white-space:pre-line;flex:1}
.sb-item .sbi-time{font-size:10px;color:#999;flex-shrink:0}
.sb-item .sbi-check{font-size:18px;flex-shrink:0}
.sb-empty{text-align:center;color:#ccc;font-size:12px;padding:10px 0}
.sb-btn{
  display:block;width:100%;padding:8px;border-radius:10px;text-align:center;
  background:rgba(255,255,255,0.6);border:none;font-size:13px;color:#8b5e3c;
  font-weight:700;cursor:pointer;font-family:inherit;
}
.sb-btn:active{background:rgba(255,255,255,0.9)}

.header{text-align:center;margin:8px 0 4px}
.header .title{
  font-size:clamp(22px,4.5vw,36px);font-weight:900;
  background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);
  background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:rainbow 3s linear infinite;line-height:1.3;
}
@keyframes rainbow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.header .subtitle{font-size:clamp(11px,2.2vw,15px);color:#8b5e3c;font-weight:700;margin-top:2px}
.header .tag{display:inline-block;background:#ffe0e0;color:#d44;padding:3px 14px;border-radius:12px;font-size:13px;font-weight:700;margin-top:4px}

.box-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(10px,2.3vw,16px);max-width:520px;width:100%;margin:6px auto 10px;padding:0 8px}
@media(max-width:420px){.box-grid{grid-template-columns:repeat(2,1fr);gap:8px}}

.box{aspect-ratio:1;perspective:700px;cursor:pointer;transition:transform 0.15s;position:relative}
.box:hover:not(.done):not(.locked){transform:scale(1.03)}
.box:active:not(.done):not(.locked){transform:scale(0.96)}
.box.locked{cursor:not-allowed;filter:brightness(0.85) saturate(0.4)}
.box.done{pointer-events:none}
.box-inner{width:100%;height:100%;position:relative;transition:transform 0.55s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d;border-radius:18px}
.box.opened .box-inner,.box.done .box-inner{transform:rotateY(180deg)}
.face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.face-front{background:linear-gradient(145deg,#fff5f5,#ffe0e0,#ffd4d4);border:3px dashed #ffb3b3;box-shadow:0 5px 20px rgba(0,0,0,0.07)}
.face-front .gift{font-size:clamp(32px,7vw,52px);animation:bounce 1.5s ease-in-out infinite}
.face-front .hint{font-size:13px;color:#e88;margin-top:3px;font-weight:900;animation:pulse 1.2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)scale(1)}30%{transform:translateY(-12px)scale(1.1)}60%{transform:translateY(0)scale(0.95)}80%{transform:translateY(-4px)scale(1.05)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.box:nth-child(6n+1) .face-front{background:linear-gradient(145deg,#fff0f5,#ffd6e7,#ffc2d9);border-color:#ffb3cc}
.box:nth-child(6n+2) .face-front{background:linear-gradient(145deg,#fff8e8,#ffe8c8,#ffd9a8);border-color:#ffcc88}
.box:nth-child(6n+3) .face-front{background:linear-gradient(145deg,#f0fff0,#d4f5d4,#b8ebb8);border-color:#99dd99}
.box:nth-child(6n+4) .face-front{background:linear-gradient(145deg,#f0f5ff,#d4e4ff,#b8d4ff);border-color:#99bbff}
.box:nth-child(6n+5) .face-front{background:linear-gradient(145deg,#fff5ff,#f0d4ff,#e5b8ff);border-color:#cc99ee}
.box:nth-child(6n+6) .face-front{background:linear-gradient(145deg,#fffdf0,#fff0c0,#ffe8a0);border-color:#ffdd77}
.face-back{background:linear-gradient(145deg,#fffdf5,#fff8e8,#fff3d0);border:4px solid #ffd700;transform:rotateY(180deg);padding:4px;text-align:center;box-shadow:0 0 25px rgba(255,215,0,0.25)}
.face-back .r-emoji{font-size:clamp(26px,5vw,38px)}
.face-back .r-text{font-size:clamp(9px,1.8vw,12px);font-weight:900;color:#6b4226;margin-top:2px;line-height:1.2;white-space:pre-line}
.box.done .face-back{border-color:#6bcb77;background:linear-gradient(145deg,#f5fff5,#e8ffe8,#d0ffd0)}
.box.done::after{content:'✅';position:absolute;top:-6px;right:-4px;font-size:24px;z-index:5;animation:popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275)}
@keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
.box.shaking .box-inner{animation:shake 0.5s ease-in-out}
@keyframes shake{0%,100%{transform:rotateY(0)translateX(0)}10%{transform:rotateY(-10deg)translateX(-6px)}20%{transform:rotateY(10deg)translateX(6px)}30%{transform:rotateY(-15deg)translateX(-8px)}40%{transform:rotateY(15deg)translateX(8px)}50%{transform:rotateY(-10deg)translateX(-4px)}60%{transform:rotateY(10deg)translateX(4px)}70%{transform:rotateY(-5deg)translateX(-2px)}80%{transform:rotateY(5deg)translateX(2px)}90%{transform:rotateY(-2deg)translateX(0)}}

.confetti{position:fixed;pointer-events:none;z-index:100;animation:cf 1.8s ease-out forwards}
@keyframes cf{0%{transform:translateY(-120px)rotate(0deg)scale(1);opacity:1}70%{opacity:1}100%{transform:translateY(105vh)rotate(720deg)scale(0.3);opacity:0}}
.spark{position:fixed;pointer-events:none;z-index:101;animation:sp 0.9s ease-out forwards;font-size:22px}
@keyframes sp{0%{transform:translate(0,0)scale(0);opacity:1}100%{transform:translate(var(--dx),var(--dy))scale(1.5);opacity:0}}

.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:90;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.popup{background:white;border-radius:24px;padding:25px 20px;text-align:center;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:popCard 0.4s cubic-bezier(0.175,0.885,0.32,1.275)}
@keyframes popCard{0%{transform:scale(0.3);opacity:0}100%{transform:scale(1);opacity:1}}
.popup .o-emoji{font-size:64px;display:block}
.popup .o-text{font-size:20px;font-weight:900;color:#6b4226;margin:8px 0;white-space:pre-line;line-height:1.4}
.popup .o-note{font-size:13px;color:#999;margin-bottom:12px}
.popup .o-timer{font-size:36px;font-weight:900;color:#6bcb77;margin:8px 0;font-variant-numeric:tabular-nums}
.popup .btn{
  display:block;width:100%;padding:14px;border-radius:30px;border:none;font-size:18px;font-weight:900;
  cursor:pointer;font-family:inherit;margin:6px 0;color:white;transition:transform 0.15s;
}
.popup .btn:active{transform:scale(0.93)}
.btn-start{background:linear-gradient(135deg,#ff8e53,#ff6b6b);box-shadow:0 6px 20px rgba(255,107,107,0.35)}
.btn-later{background:#ddd;color:#999;box-shadow:none}
.btn-done{background:linear-gradient(135deg,#6bcb77,#4caf50);box-shadow:0 6px 20px rgba(107,203,119,0.35)}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:95;display:flex;align-items:center;justify-content:center}
.panel{background:white;border-radius:18px;padding:18px;max-width:400px;width:90%;max-height:75vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.panel h3{text-align:center;color:#6b4226;margin-bottom:10px}
.panel .day-block{margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:6px}
.panel .day-date{font-size:13px;font-weight:900;color:#b88;margin-bottom:3px}
.panel .day-items{display:flex;flex-wrap:wrap;gap:3px}
.panel .day-item{font-size:10px;background:#f5f5f5;padding:2px 7px;border-radius:7px;color:#666}
.panel .day-item.ok{background:#e8ffe8;color:#4a4}
.panel .close-btn{display:block;width:100%;margin-top:8px;padding:10px;border-radius:12px;background:#ff6b6b;color:white;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.stat-row{display:flex;align-items:center;gap:8px;margin:5px 0;padding:5px 8px;background:#fafafa;border-radius:8px}
.stat-row .s-emoji{font-size:20px}
.stat-row .s-info{flex:1;min-width:0}
.stat-row .s-name{font-size:11px;font-weight:700;color:#6b4226}
.stat-row .s-bar{display:flex;align-items:center;gap:5px;margin-top:1px}
.stat-row .s-bar-bg{flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden}
.stat-row .s-bar-fg{height:100%;border-radius:4px}
.stat-row .s-pct{font-size:9px;color:#999}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h3>📋 今日盲盒</h3>
    <div class="sb-date" id="sbDate"></div>
    <div id="sbList"><div class="sb-empty">🎁 还没开盲盒哦～</div></div>
    <button class="sb-btn" onclick="showHistory()">📅 历史记录</button>
    <button class="sb-btn" onclick="showStats()">📊 学习统计</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="header">
      <div class="title">🎁 小公主的魔法盲盒</div>
      <div class="subtitle">✨ 每天 10 个盲盒，完成一个自动刷新 ✨</div>
      <div class="tag" id="statusTag">🎯 试试手气，看看今天抽到什么！</div>
    </div>
    <div class="box-grid" id="grid"></div>
    <div style="text-align:center;margin-bottom:12px">
      <button class="sb-btn" style="display:inline;padding:8px 18px;font-size:12px" onclick="resetToday()">🔄 重新抽今天</button>
    </div>
  </div>
</div>

<script>
// ====================== DATA ======================
const subjects = {
  chinese:[
    {emoji:'✏️',text:'看图写话\n一篇小作文',tag:'语文',w:6},
    {emoji:'📝',text:'2年级语文书\n背诵与朗读',tag:'语文',w:6},
    {emoji:'📢',text:'语文课外\n大声朗读10分钟',tag:'语文',w:6},
    {emoji:'✒️',text:'语文练字帖\n15分钟',tag:'语文',w:6},
    {emoji:'🎤',text:'出口成章APP\n阅读练习',tag:'语文',w:6},
  ],
  english:[
    {emoji:'📖',text:'英语阅读\n15分钟',tag:'英语',w:6},
    {emoji:'🔤',text:'26个英语字母\n默写',tag:'英语',w:6},
    {emoji:'📋',text:'认读核心词汇\n抄写单词5个',tag:'英语',w:6},
  ],
  math:[
    {emoji:'🧮',text:'计算小能手\n15分钟',tag:'数学',w:6},
    {emoji:'📐',text:'做数学题\n20分钟',tag:'数学',w:6},
    {emoji:'🔢',text:'背诵\n乘法口诀',tag:'数学',w:6},
    {emoji:'🧾',text:'背诵乘法表\n10分钟',tag:'数学',w:6},
    {emoji:'🎯',text:'趣数畅游\n一整夏',tag:'数学',w:6},
  ],
  piano:[{emoji:'🎹',text:'钢琴练习\n15分钟',tag:'钢琴',w:6}],
  fun:[
    {emoji:'🎨',text:'手工游戏\n创意时间',tag:'趣味',w:3},
    {emoji:'👶',text:'陪弟弟玩耍\n30分钟',tag:'趣味',w:3},
    {emoji:'🖼️',text:'自由画画\n15分钟',tag:'趣味',w:3},
    {emoji:'⚽',text:'户外运动\n30分钟',tag:'趣味',w:3},
    {emoji:'🦘',text:'Khankids\n15分钟',tag:'趣味',w:3},
  ],
  reward:[
    {emoji:'🎁',text:'奖励\n10元礼物',tag:'惊喜',w:6},
    {emoji:'📱',text:'看平板\n15分钟',tag:'惊喜',w:3},
    {emoji:'💰',text:'奖励\n20元礼物',tag:'惊喜',w:2},
    {emoji:'💎',text:'奖励\n30元礼物',tag:'惊喜',w:1},
    {emoji:'💵',text:'奖励\n100元礼物',tag:'惊喜',w:1},
    {emoji:'☕',text:'奖励\n休息半天',tag:'惊喜',w:1},
    {emoji:'🏖️',text:'奖励\n休息一天',tag:'惊喜',w:1},
  ],
};
function pickW(p){const t=p.reduce((s,a)=>s+a.w,0);let r=Math.random()*t;for(const a of p){r-=a.w;if(r<=0)return a}return p[p.length-1]}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function draw10(){
  const d=[];
  d.push(pickW(subjects.chinese));d.push(pickW(subjects.chinese));
  d.push(pickW(subjects.english));d.push(pickW(subjects.english));
  d.push(pickW(subjects.math));d.push(pickW(subjects.math));
  d.push(pickW(subjects.piano));
  d.push(pickW(subjects.reward));d.push(pickW(subjects.reward));
  const rest=[...subjects.chinese,...subjects.english,...subjects.math,...subjects.fun];
  const f=rest.filter(a=>!d.some(x=>x.emoji+x.text===a.emoji+a.text));
  d.push(f.length>0?pickW(f):pickW(rest));
  shuf(d); return d;
}

// ====================== STORAGE ======================
function tk(){return new Date().toISOString().slice(0,10)}
function load(d){try{return JSON.parse(localStorage.getItem('bb_'+d))}catch(e){return null}}
function save(d,v){localStorage.setItem('bb_'+d,JSON.stringify(v))}
function getToday(){const k=tk();let r=load(k);if(!r)r={date:k,items:[],done:false};return r}

// ====================== STATE ======================
const T=10, V=6;
let items=[], completed=0, current=-1, locked=false, timerSec=0, timerInt=null;

function init(){
  const rec=getToday();
  items=rec.items.length===T?rec.items:draw10();
  completed=0; current=-1; locked=false;
  items.forEach(t=>{if(t.done){completed|=(1<<items.indexOf(t))}});
  if(items.every(t=>t.done)) completed=(1<<T)-1;
  document.getElementById('sbDate').textContent='📅 '+tk();
  render(); updSidebar(); updStatus();
}

// ====================== RENDER ======================
function render(){
  const g=document.getElementById('grid'); g.innerHTML='';
  const remain=[];
  for(let i=0;i<T;i++) if(!(completed&(1<<i))) remain.push(i);
  shuf(remain);
  const show=remain.slice(0,V);
  const doneList=[];
  for(let i=0;i<T;i++) if(completed&(1<<i)) doneList.push(i);
  const all=[...doneList.slice(-Math.min(3,doneList.length)),...show].slice(0,V);

  for(let j=0;j<V;j++){
    const box=document.createElement('div'); box.className='box';
    if(j<all.length){
      const i=all[j]; const item=items[i];
      box.dataset.idx=i;
      if(completed&(1<<i)){
        box.className='box opened done';
        box.innerHTML=`<div class="box-inner"><div class="face face-front"><div class="gift">🎁</div></div><div class="face face-back"><div class="r-emoji">${item.emoji}</div><div class="r-text">${item.text}</div></div></div>`;
        box.addEventListener('click',()=>{completed^=(1<<i);item.done=!!(completed&(1<<i));save(tk(),{date:tk(),items,allDone:completed===((1<<T)-1)});render();updSidebar();updStatus()});
      }else{
        box.id='box-'+i;
        box.innerHTML=`<div class="box-inner"><div class="face face-front"><div class="gift">🎁</div><div class="hint">👆 点我打开</div></div><div class="face face-back"><div class="r-emoji">${item.emoji}</div><div class="r-text">${item.text}</div></div></div>`;
        box.addEventListener('click',()=>open(i,box));
      }
    }else{
      box.className='box done';
      box.innerHTML=`<div class="box-inner"><div class="face face-front"><div class="gift" style="font-size:28px">🏆</div></div></div>`;
    }
    g.appendChild(box);
  }
  updLocks();
}

function updLocks(){
  document.querySelectorAll('.box').forEach(b=>{
    const i=parseInt(b.dataset.idx); if(isNaN(i)||(completed&(1<<i))) return;
    if(i===current) return;
    if(current>=0) b.classList.add('locked'); else b.classList.remove('locked');
  });
}

// ====================== SIDEBAR ======================
function updSidebar(){
  const sb=document.getElementById('sbList');
  const opened=items.filter(t=>t.done).length;
  if(opened===0){sb.innerHTML='<div class="sb-empty">🎁 还没开盲盒哦～</div>';return}
  sb.innerHTML=items.map((t,i)=>{
    if(!t.done) return '';
    const tm=t.time?` ⏱${Math.floor(t.time/60)}:${String(t.time%60).padStart(2,'0')}`:'';
    return `<div class="sb-item done" onclick="toggleItem(${i})" title="点击切换完成状态">
      <span class="sbi-emoji">✅</span>
      <span class="sbi-text">${t.text.replace(/\n/g,'<br>')}</span>
      <span class="sbi-time">${tm}</span>
      <span class="sbi-check">✅</span>
    </div>`;
  }).join('');
}

function toggleItem(i){
  completed^=(1<<i); items[i].done=!!(completed&(1<<i));
  save(tk(),{date:tk(),items,allDone:completed===((1<<T)-1)});
  render(); updSidebar(); updStatus();
}

// ====================== STATUS ======================
function updStatus(){
  const tag=document.getElementById('statusTag');
  const done=completed===((1<<T)-1);
  const cnt=items.filter(t=>t.done).length;
  if(done){tag.textContent='🏆 今日 10 个盲盒全部完成！太棒啦！';tag.style.background='#d4f5d4';tag.style.color='#4a4'}
  else if(current>=0&&timerInt){tag.textContent='⏱️ 正在计时中...';tag.style.background='#fff0d0';tag.style.color='#e8a010'}
  else if(cnt===0){tag.textContent='🎯 试试手气，看看今天抽到什么！';tag.style.background='#ffe0e0';tag.style.color='#d44'}
  else{tag.textContent=`✨ 已完成 ${cnt} 个，还剩 ${T-cnt} 个盲盒`;tag.style.background='#ffe0e0';tag.style.color='#d44'}
}

// ====================== OPEN & TIMER ======================
function canOpen(i){
  if(completed&(1<<i)) return false;
  if(i===current||current>=0||locked) return false;
  return true;
}
function open(i,box){
  if(!canOpen(i)) return;
  locked=true; current=i;
  box.classList.add('shaking');
  setTimeout(()=>{
    box.classList.remove('shaking'); box.classList.add('opened');
    updLocks(); updStatus();
    const r=box.getBoundingClientRect();
    spawnFX(r.left+r.width/2,r.top+r.height/2);
    setTimeout(()=>showReady(items[i],i),600);
  },520);
}
function showReady(item,i){
  const ov=document.createElement('div');ov.className='overlay';ov.id='readyPopup';
  ov.innerHTML=`<div class="popup">
    <span class="o-emoji">${item.emoji}</span>
    <div class="o-text">${item.text.replace(/\n/g,'<br>')}</div>
    <div class="o-note">准备开始了吗？</div>
    <button class="btn btn-start" onclick="startTimer(${i})">⏱️ 开始计时</button>
    <button class="btn btn-later" onclick="skipTimer(${i})">等会儿再说</button>
  </div>`;
  document.body.appendChild(ov);
}
function startTimer(i){
  const ov=document.getElementById('readyPopup'); if(ov)ov.remove();
  timerSec=0; current=i; locked=true;
  timerInt=setInterval(()=>{
    timerSec++;
    const el=document.getElementById('timerDisplay');
    if(el) el.textContent=fmtTime(timerSec);
  },1000);
  updStatus();
  // Show timer popup
  const ov2=document.createElement('div');ov2.className='overlay';ov2.id='timerPopup';
  ov2.innerHTML=`<div class="popup">
    <span class="o-emoji">⏱️</span>
    <div class="o-timer" id="timerDisplay">00:00</div>
    <div class="o-note">加油！计时中...</div>
    <button class="btn btn-done" onclick="stopTimer(${i})">✅ 我完成啦</button>
  </div>`;
  document.body.appendChild(ov2);
}
function skipTimer(i){
  const ov=document.getElementById('readyPopup'); if(ov)ov.remove();
  completed|=(1<<i); items[i].done=true; items[i].time=0;
  current=-1; locked=false;
  save(tk(),{date:tk(),items,allDone:completed===((1<<T)-1)});
  render(); updSidebar(); updStatus();
  if(completed===((1<<T)-1)) setTimeout(()=>showAllDone(),500);
}
function stopTimer(i){
  clearInterval(timerInt); timerInt=null;
  const ov=document.getElementById('timerPopup'); if(ov)ov.remove();
  completed|=(1<<i); items[i].done=true; items[i].time=timerSec;
  current=-1; locked=false; timerSec=0;
  save(tk(),{date:tk(),items,allDone:completed===((1<<T)-1)});
  render(); updSidebar(); updStatus();
  if(completed===((1<<T)-1)) setTimeout(()=>showAllDone(),500);
}
function fmtTime(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
function showAllDone(){
  const ov=document.createElement('div');ov.className='overlay';ov.id='allDone';
  ov.innerHTML=`<div class="popup"><span class="o-emoji">🏆</span><div class="o-text">太棒啦！<br>今天的任务全部完成！</div><div class="o-note">明天再来开盲盒哦～</div><button class="btn btn-start" onclick="document.getElementById('allDone').remove()">🎉 知道啦</button></div>`;
  document.body.appendChild(ov);
}

// ====================== FX ======================
function spawnFX(cx,cy){
  const e=['✨','⭐','💫','🌟','💖','🎉','🪄','🔮'];
  for(let i=0;i<10;i++){const s=document.createElement('div');s.className='spark';s.textContent=e[Math.floor(Math.random()*e.length)];s.style.left=cx+'px';s.style.top=cy+'px';s.style.setProperty('--dx',(Math.random()-.5)*220+'px');s.style.setProperty('--dy',(Math.random()-.5)*220-50+'px');s.style.animationDelay=Math.random()*.1+'s';s.style.animationDuration=(.5+Math.random()*.4)+'s';document.body.appendChild(s);setTimeout(()=>s.remove(),900)}
  const c=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff8e53','#ff69b4','#a18cd1','#fbc2eb'];
  for(let i=0;i<30;i++){const p=document.createElement('div');p.className='confetti';p.textContent=['■','●','▲','★','♦','♥'][Math.floor(Math.random()*6)];p.style.left=Math.random()*100+'%';p.style.top=-(10+Math.random()*25)+'px';p.style.color=c[Math.floor(Math.random()*c.length)];p.style.fontSize=(7+Math.random()*11)+'px';p.style.animationDelay=Math.random()*.4+'s';p.style.animationDuration=(1.2+Math.random()*1.4)+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),2300)}
}

// ====================== HISTORY & STATS ======================
function showHistory(){
  const recs=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('bb_')){try{const d=JSON.parse(localStorage.getItem(k));if(d&&d.items)recs.push(d)}catch(e){}}}
  recs.sort((a,b)=>b.date.localeCompare(a.date));
  let h='<div class="panel"><h3>📅 历史记录</h3>';
  if(!recs.length) h+='<p style="text-align:center;color:#ccc">暂无记录</p>';
  for(const r of recs.slice(0,30)){const dc=(r.items||[]).filter(t=>t.done).length;h+=`<div class="day-block"><div class="day-date">${r.date===tk()?'⭐ ':''}${r.date} — ${dc}/${r.items.length}</div><div class="day-items">${(r.items||[]).map(t=>`<span class="day-item${t.done?' ok':''}">${t.emoji} ${t.text.replace(/\\n/g,' ').slice(0,8)}</span>`).join('')}</div></div>`}
  h+='<button class="close-btn" onclick="this.parentElement.parentElement.remove()">关闭</button></div>';
  const ov=document.createElement('div');ov.className='modal';ov.innerHTML=h;ov.addEventListener('click',e=>{if(e.target===ov)ov.remove()});document.body.appendChild(ov);
}
function showStats(){
  const recs=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('bb_')){try{const d=JSON.parse(localStorage.getItem(k));if(d&&d.items)recs.push(d)}catch(e){}}}
  const st={};let totO=0,totC=0;for(const r of recs)for(const t of r.items||[]){const n=t.text.replace(/\n/g,' ');if(!st[n])st[n]={e:t.emoji,o:0,d:0};st[n].o++;totO++;if(t.done){st[n].d++;totC++}}
  const sorted=Object.entries(st).sort((a,b)=>b[1].o-a[1].o);
  let h=`<div class="panel"><h3>📊 学习统计</h3><p style="text-align:center;color:#8b5e3c;font-size:13px;margin-bottom:6px">📅 ${recs.length} 天 | 开盒 ${totO} 次 | 完成 ${totC} 次 | ${totO>0?Math.round(totC/totO*100):0}%</p><div style="max-height:55vh;overflow-y:auto">`;
  for(const[n,s] of sorted){const pct=s.o>0?Math.round(s.d/s.o*100):0;const bc=pct>=80?'#6bcb77':pct>=50?'#ffd93d':'#ff8e53';h+=`<div class="stat-row"><span class="s-emoji">${s.e}</span><div class="s-info"><div class="s-name">${n}</div><div class="s-bar"><div class="s-bar-bg"><div class="s-bar-fg" style="width:${pct}%;background:${bc}"></div></div><span class="s-pct">${s.d}/${s.o} (${pct}%)</span></div></div></div>`}
  h+=`</div><div style="display:flex;gap:8px;margin-top:8px"><button class="close-btn" style="flex:1;background:#4d96ff" onclick="exportCSV();document.querySelector('.modal')?.remove()">📥 导出</button><button class="close-btn" style="flex:1" onclick="this.parentElement.parentElement.parentElement.remove()">关闭</button></div></div>`;
  const ov=document.createElement('div');ov.className='modal';ov.innerHTML=h;ov.addEventListener('click',e=>{if(e.target===ov)ov.remove()});document.body.appendChild(ov);
}
function exportCSV(){
  const recs=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('bb_')){try{const d=JSON.parse(localStorage.getItem(k));if(d&&d.items)recs.push(d)}catch(e){}}}
  recs.sort((a,b)=>a.date.localeCompare(b.date));
  let csv='日期,任务,类别,是否完成,用时(秒)\n';for(const r of recs)for(const t of r.items||[])csv+=`${r.date},"${t.text.replace(/\n/g,' ')}","${t.tag||''}",${t.done?'是':'否'},${t.time||''}\n`;
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`盲盒记录_${tk()}.csv`;a.click();
}
function resetToday(){
  // Generate random 2-digit × 1-digit multiplication
  const a=Math.floor(Math.random()*80)+11; // 11~90
  const b=Math.floor(Math.random()*8)+2;   // 2~9
  const answer=a*b;
  const ov=document.createElement('div');ov.className='overlay';ov.id='resetPopup';
  ov.innerHTML=`<div class="popup">
    <span class="o-emoji">🧮</span>
    <div class="o-text">家长验证</div>
    <div style="font-size:28px;font-weight:900;color:#6b4226;margin:12px 0">${a} × ${b} = ？</div>
    <input type="number" id="resetAnswer" style="width:120px;padding:10px;font-size:22px;text-align:center;border:2px solid #ddd;border-radius:12px;font-family:inherit" placeholder="?">
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-done" style="flex:1" onclick="checkReset(${answer})">确认重置</button>
      <button class="btn btn-later" style="flex:1;color:#666" onclick="document.getElementById('resetPopup').remove()">取消</button>
    </div>
    <div id="resetError" style="color:#e44;font-size:13px;margin-top:6px;display:none">❌ 答案不对哦，再算一次</div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>{const inp=document.getElementById('resetAnswer');inp?.focus();inp?.addEventListener('keydown',e=>{if(e.key==='Enter')checkReset(answer)});},300);
}
function checkReset(ans){
  const inp=document.getElementById('resetAnswer');
  const val=parseInt(inp?.value);
  if(val===ans){
    document.getElementById('resetPopup')?.remove();
    const k=tk();items=draw10();items.forEach(t=>{t.done=false;t.time=0});save(k,{date:k,items,allDone:false});
    completed=0;current=-1;locked=false;timerSec=0;if(timerInt){clearInterval(timerInt);timerInt=null}
    render();updSidebar();updStatus();
  }else{
    const err=document.getElementById('resetError');if(err)err.style.display='block';
    if(inp)inp.value='';inp?.focus();
  }
}

// ====================== START ======================
init(); if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
